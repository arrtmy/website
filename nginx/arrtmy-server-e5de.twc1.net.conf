## nginx config for arrtmy-server-e5de.twc1.net
# Save to /etc/nginx/sites-available/arrtmy-server-e5de.twc1.net and enable with sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name arrtmy-server-e5de.twc1.net;

    # ACME challenge for certbot (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arrtmy-server-e5de.twc1.net;

    # Paths to Let's Encrypt certs (will be created by certbot)
    ssl_certificate /etc/letsencrypt/live/arrtmy-server-e5de.twc1.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arrtmy-server-e5de.twc1.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Static files root (change to actual deploy location)
    root /var/www/website/frontend/dist;
    index index.html;

    # Serve static assets directly (faster)
    location /assets/ {
        alias /var/www/website/frontend/dist/assets/;
        access_log off;
        expires 30d;
    }

    # API proxied to local Node/Express
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 90;
    }

    # All other requests -> try static, otherwise fallback to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: increase body size for uploads
    client_max_body_size 50M;
}
